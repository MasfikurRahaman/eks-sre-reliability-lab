apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
    spec:
      containers:
      - name: checkout-api
        image: masum140/eks-sre:checkout-api
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "150m"
            memory: "128Mi"
          limits:
            cpu: "400m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
